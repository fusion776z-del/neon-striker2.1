<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" /><title>NEONSTRIKER2</title><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><style>:root{--bg1:#020611;--bg2:#071226;--cyan:#72f7ff;--pink:#ff5db1;--orange:#ffb347;--green:#89ff9b;--red:#ff6262}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;color:#fff;background:radial-gradient(circle at 15% 15%,rgba(0,180,255,.14),transparent 28%),radial-gradient(circle at 82% 24%,rgba(255,90,177,.12),transparent 26%),radial-gradient(circle at 60% 80%,rgba(137,255,155,.09),transparent 28%),linear-gradient(180deg,#010309,#070d1a 50%,#02040b 100%);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.frame{padding:16px;border-radius:24px;background:rgba(9,16,32,.72);backdrop-filter:blur(10px);border:1px solid rgba(114,247,255,.22);box-shadow:0 22px 70px rgba(0,0,0,.48),0 0 40px rgba(114,247,255,.08)}canvas{display:block;border-radius:16px;background:#020611;box-shadow:inset 0 0 0 1px rgba(255,255,255,.04),0 0 28px rgba(114,247,255,.08);outline:none}.caption{margin-top:10px;display:flex;justify-content:space-between;gap:12px;font-size:12px;letter-spacing:.08em;color:rgba(222,242,255,.8)}.pill{padding:5px 10px;border-radius:999px;border:1px solid rgba(114,247,255,.22);background:rgba(10,19,40,.54)}html,body{height:100%;}body{touch-action:none;overscroll-behavior:none;}.frame{position:relative;display:grid;place-items:center;padding:14px;}#game{width:min(92vw,calc(92vh * 9 / 16));height:auto;aspect-ratio:9/16;max-width:520px;touch-action:none;}.diag{position:absolute;right:10px;top:10px;max-width:70ch;padding:9px 10px;border-radius:14px;background:rgba(0,0,0,.60);border:1px solid rgba(255,98,98,.40);color:rgba(255,255,255,.92);font:12px ui-monospace,SFMono-Regular,Menlo,monospace;display:n 255,98,98,.28) !important;}.tbtn.bombTR{position:fixed;right:calc(0px + env(safe-area-inset-right));top:calc(0px + env(safe-area-inset-top));z-index:95;}.tbtn.fireMR{position:fixed;right:calc(0px + env(safe-area-inset-right));top:50%;transform:translateY(-50%);z-index:95;}#focusBtn.focusRB{position:fixed;left:auto;top:auto;right:calc(0px + env(safe-area-inset-right));bottom:calc(0px + env(safe-area-inset-bottom));width:128px;height:72px;border-radius:22px;z-index:95;}@media (min-width:430px){:root{--fireSize:92px;}#focusBtn.focusRB{width:168px;height:88px;font-size:15px;}.tbtn.bombTR{width:200px;height:92px;font-size:16px;}.tbtn.fireMR{width:92px;height:92px;border-radius:26px;font-size:14px;}.tbtn.typeMR{border-radius:26px;font-size:13px;}}#joystick{position:fixed !important;left:calc(12px + env(safe-area-inset-left)) !important;bottom:calc(12px + env(safe-area-inset-bottom)) !important;right:auto !important;top:auto !important;width:136px !important;height:136px !important;transform:none !important;-webkit-user-drag:none;user-select:none;touch-action:none;}:root{--uiGlass:rgba(10,19,40,.18);--uiBorder:rgba(114,247,255,.16);}#joystick{background:rgba(114,247,255,.04) !important;border:1px solid rgba(114,247,255,.14) !important;backdrop-filter:blur(8px) saturate(1.15);box-shadow:0 10px 24px rgba(0,0,0,.22) !important;}#joystick .base{background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.06),transparent 58%) !important;box-shadow:inset 0 0 0 1px rgba(255,255,255,.04) !important;}#joystick .stick{background:rgba(114,247,255,.62) !important;box-shadow:0 8px 16px rgba(0,0,0,.26),0 0 16px rgba(114,247,255,.16) !important;}#joystick .label{color:rgba(222,242,255,.55) !important;}.tbtn{background:rgba(10,19,40,.18) !important;border-color:rgba(114,247,255,.16) !important;box-shadow:0 8px 20px rgba(0,0,0,.24) !important;}.tbtn.warn{border-color:rgba(255,93,177,.18) !important;}.tbtn.gold{border-color:rgba(255,216,77,.18) !important;}.tbtn.green{border-color:rgba(13 </style></head><body><div class="frame"><div class="diag" id="diag"></div><canvas id="game" width="360" height="640" tabindex="0"></canvas></div><div id="pauseBtn" class="tbtn small warn pauseAboveJoy" data-tap="pause" aria-label="pause">PAUSE</div><div id="joystick" aria-label="move joystick"><div class="label">MOVE</div><div class="base"></div><div class="stick" id="stick"></div></div><div class="actions" aria-hidden="true"><div class="tbtn big gold" id="bombBtn" data-tap="bomb" aria-label="bomb">BOMB</div><div class="tbtn big" id="typeBtn" data-tap="type" aria-label="shot type">TYPE:N</div><div class="tbtn big green" id="focusBtn" data-hold="focus" aria-label="focus">FOCUS</div></div><div class="caption"><span class="pill">MOVE ←↑↓→ / SHOT Z / LASER X / BOMB C / FOCUS Shift / PAUSE Space / START Z / BGM: STAGE x7 OVERDRIVE (SUBBASS HEAVY)</span></div></div><script>
"use strict";

const cvs = document.getElementById('game');

const ctx = cvs.getContext('2d', { alpha: false, desynchronized: true });

ctx.imageSmoothingEnabled = false;

const VW = cvs.width, VH = cvs.height;
// logical playfield (kept from original 16:9)
const W = 640, H = 360;


const IS_MOBILE = (window.matchMedia && window.matchMedia('(pointer: coarse)').matches) || ('ontouchstart' in window);

const SE2_MODE = IS_MOBILE && Math.min(screen.width||9999, screen.height||9999) <= 375 && (window.devicePixelRatio||1) >= 2;

let lowQuality = SE2_MODE || IS_MOBILE;

let fpsAvg = 60;

let _lastFrameT = performance.now();

function _updatePerf(now){

  const dt = Math.max(1, now - _lastFrameT);

  _lastFrameT = now;

  const fps = 1000 / dt;

  fpsAvg = fpsAvg * 0.92 + fps * 0.08;

  if(IS_MOBILE && !SE2_MODE){

    if(fpsAvg < 55) lowQuality = true;

    else if(fpsAvg > 59) lowQuality = false;

  }

}


const ENEMY_BULLET_SPEED_SCALE = SE2_MODE ? 0.44 : (IS_MOBILE ? 0.46 : 0.5);

const HOMING_UNLOCK_POWER = 5;

const FOCUS_MOVE_SCALE = 0.62;

const BULLET_HELL_MULT = 1.00; 

const MOB_BULLET_KEEP_DEN = 10; 

const MOB_BULLET_KEEP_NUM = 1;

const BOSS_BARRAGE_MULT = SE2_MODE ? 0.90 : 1.15; 


const BOSS_ATTACK_TEMPLATE = 1;


const BOSS_EXTRAS_ENABLED = false;
const BOSS_SIZE_SCALE = 1.25; // 各ボス巨大化



function bossCount(n){


 const load = getBulletLoadScale(); 


 const bossActive = (boss && !boss.entering);

 const stg = bossActive ? (BOSS_ATTACK_TEMPLATE || (boss.stage || stage)) : stage;


 const stageScale = 1.0;


 const bossLoad = Math.min(1, Math.max(0.55, load + 0.10));


 const hpRatio = bossActive ? Math.max(0, Math.min(1, boss.hp / boss.maxHP)) : 1;

 const hpScale = 1 + (1 - hpRatio) * 0.75; 

 const phaseScale = bossActive ? (boss.phase===4 ? 1.55 : (boss.phase===3 ? 1.30 : (boss.phase===2 ? 1.12 : 1.0))) : 1.0;


 const target = Math.max(1, Math.round(n * BOSS_BARRAGE_MULT * bossLoad * hpScale * phaseScale * stageScale));


 const room = Math.max(0, maxEnemyBullets() - (enemyBullets ? enemyBullets.length : 0));

 const capFrac = SE2_MODE ? (stg >= 3 ? 0.05 : 0.08) : (IS_MOBILE ? 0.10 : 0.12);

 const cap = Math.max(1, Math.floor(room * capFrac)); 

 return Math.min(target, cap);

}

const EXTRA_LIFE_CAPSULES = 10;

const MAX_ENEMY_BULLETS = 180; 

function maxEnemyBullets(){


  if(SE2_MODE && boss && !boss.entering && (boss.stage || stage) >= 3) return 140;

  return MAX_ENEMY_BULLETS;

}

const MAX_PARTICLES = 120; 

const BULLET_SOFTCAP = 120; 

cvs.focus();


const audioCtx = new (window.AudioContext || window.webkitAudioContext)();


let audioUnlocked = false;

let pendingBGM = null;

function _primeAudio(){

  try{


    const buf = audioCtx.createBuffer(1, 1, audioCtx.sampleRate);

    const src = audioCtx.createBufferSource();

    src.buffer = buf;

    src.connect(audioCtx.destination);

    src.start(0);

    src.stop(0.01);

  }catch(_e){}

}

function unlockAudio(){

  const p = (audioCtx.state === 'suspended') ? audioCtx.resume().catch(()=>{}) : Promise.resolve();

  p.then(()=>{

    audioUnlocked = (audioCtx.state === 'running');

    if(audioUnlocked) _primeAudio();

    if(audioUnlocked && pendingBGM){

      const {stage,isBoss} = pendingBGM;

      pendingBGM = null;

      startBGM(stage,isBoss);

    }

  });

}


audioCtx.onstatechange = ()=>{

  if(audioCtx.state === 'running'){

    audioUnlocked = true;

    if(pendingBGM){

      const {stage,isBoss} = pendingBGM;

      pendingBGM = null;

      startBGM(stage,isBoss);

    }

  }

};

document.addEventListener('visibilitychange', ()=>{

  if(document.visibilityState === 'visible') resumeAudio();

});

function resumeAudio(){ unlockAudio(); }

cvs.addEventListener('pointerdown', resumeAudio);

document.addEventListener('keydown', resumeAudio, {once:true});

function beep(type, f1, f2, t, g){

  if(audioCtx.state !== 'running') return;

  const now = audioCtx.currentTime;

  const o = audioCtx.createOscillator();

  const ga = audioCtx.createGain();

  o.type = type;

  o.frequency.setValueAtTime(f1, now);

  if(f2) o.frequency.exponentialRampToValueAtTime(f2, now + t);

  ga.gain.setValueAtTime(g, now);

  ga.gain.exponentialRampToValueAtTime(0.0001, now + t);

  o.connect(ga); ga.connect(audioCtx.destination);

  o.start(now); o.stop(now + t + 0.02);

}

const sfx = {

  shot(){ beep('square', 1500, 900, 0.05, 0.045); },

  laser(){ beep('sine', 920, 520, 0.08, 0.04); },

  bomb(){ beep('sawtooth', 120, 40, 0.30, 0.10); },

  enemyDown(){ beep('triangle', 520, 140, 0.12, 0.07); },

  hit(){ beep('sawtooth', 180, 60, 0.16, 0.08); },

  power(){ beep('square', 420, 1200, 0.18, 0.06); },

  bossDown(){ beep('sawtooth', 180, 55, 0.45, 0.06); },

  clear(){ beep('triangle', 262, 524, 0.15, 0.04); setTimeout(()=>beep('triangle', 330, 660, 0.15, 0.035), 110); setTimeout(()=>beep('triangle', 392, 784, 0.18, 0.035), 220); },

  lifeUp(){ beep('triangle', 392, 784, 0.10, 0.05); setTimeout(()=>beep('triangle', 523, 1046, 0.12, 0.04), 90); }

};


let bgmTimer = null;

let bgmBus = null;

let bgmNextTime = 0;

let bgmBar = 0;

let bgmStage = 1;

let bgmBoss = false;

let bgmNoiseBuffer = null;

let bgmBaseLevel = 0.20;


function midiHz(n){ return 440 * Math.pow(2, (n - 69) / 12); }


function ensureBgmNoise(){

  if(bgmNoiseBuffer) return bgmNoiseBuffer;

  const len = Math.floor(audioCtx.sampleRate * 1.25);

  const buffer = audioCtx.createBuffer(1, len, audioCtx.sampleRate);

  const data = buffer.getChannelData(0);

  let last = 0;

  for(let i=0;i<len;i++){

    const white = (Math.random()*2-1);

    last = (last*0.97) + (white*0.03);

    const t = i/len;

    data[i] = last * Math.pow(1 - t, 0.84);

  }

  bgmNoiseBuffer = buffer;

  return buffer;

}


function createBgmBus(level){

  const master = audioCtx.createGain();

  const drive  = audioCtx.createWaveShaper();

  const hp     = audioCtx.createBiquadFilter();

  const lp     = audioCtx.createBiquadFilter();

  const delay  = audioCtx.createDelay(0.45);

  const fb     = audioCtx.createGain();

  const wet    = audioCtx.createGain();

  const dry    = audioCtx.createGain();

  const comp   = audioCtx.createDynamicsCompressor();


  const curve = new Float32Array(2048);

  for(let i=0;i<curve.length;i++){

    const x = i/(curve.length-1)*2-1;

    curve[i] = Math.tanh(x*1.55);

  }

  drive.curve = curve;


  hp.type = 'highpass'; hp.frequency.value = 26; hp.Q.value = 0.75;

  lp.type = 'lowpass';  lp.frequency.value = 10200; lp.Q.value = 0.35;


  delay.delayTime.value = 0.165;

  fb.gain.value  = 0.22;

  wet.gain.value = 0.18;

  dry.gain.value = 1.0;


  comp.threshold.value = -24;

  comp.knee.value = 18;

  comp.ratio.value = 4.5;

  comp.attack.value = 0.003;

  comp.release.value = 0.14;


  master.gain.value = level;

  master.connect(drive);

  drive.connect(hp);

  hp.connect(lp);

  lp.connect(dry);

  lp.connect(delay);

  delay.connect(wet);

  delay.connect(fb);

  fb.connect(delay);

  dry.connect(comp);

  wet.connect(comp);

  comp.connect(audioCtx.destination);

  return {master, drive, hp, lp, delay, wet, comp};

}


function stopBGM(){

  if(bgmTimer){ clearInterval(bgmTimer); bgmTimer = null; }

  if(bgmBus && bgmBus.master){ try{ bgmBus.master.disconnect(); }catch(_e){} }

  bgmBus = null;

}


function connectPanned(node, pan){

  if(!bgmBus) return;

  if(typeof audioCtx.createStereoPanner === 'function'){

    const sp = audioCtx.createStereoPanner();

    sp.pan.value = pan;

    node.connect(sp);

    sp.connect(bgmBus.master);

  } else node.connect(bgmBus.master);

}


function pump(when, amount){

  if(!bgmBus || !bgmBus.master) return;

  const g = bgmBus.master.gain;

  const dip = Math.max(0.0, Math.min(0.55, amount || 0.25));

  const base = bgmBaseLevel || 0.20;

  try{

    g.cancelScheduledValues(when);

    g.setValueAtTime(base, when);

    g.linearRampToValueAtTime(base * (1 - dip), when + 0.010);

    g.linearRampToValueAtTime(base, when + 0.095);

  }catch(_e){}

}


function subBass(note, when, dur, gain, pan){

  if(!bgmBus) return;

  const osc = audioCtx.createOscillator();

  const sat = audioCtx.createWaveShaper();

  const amp = audioCtx.createGain();

  const lp  = audioCtx.createBiquadFilter();

  osc.type = 'sine';

  osc.frequency.setValueAtTime(midiHz(note), when);

  osc.frequency.exponentialRampToValueAtTime(midiHz(note-12), when + Math.min(0.03, dur*0.25));


  const c = new Float32Array(1024);

  for(let i=0;i<c.length;i++){

    const x=i/(c.length-1)*2-1;

    c[i]=Math.tanh(x*2.25);

  }

  sat.curve = c;


  lp.type='lowpass'; lp.frequency.setValueAtTime(220, when); lp.Q.value = 0.75;

  amp.gain.setValueAtTime(0.0001, when);

  amp.gain.linearRampToValueAtTime(gain, when + 0.006);

  amp.gain.exponentialRampToValueAtTime(0.0001, when + dur);


  osc.connect(sat); sat.connect(lp); lp.connect(amp);

  connectPanned(amp, pan==null? -0.02 : pan);

  osc.start(when); osc.stop(when + dur + 0.02);

}


function stab(note, when, dur, gain, pan, bright){

  if(!bgmBus) return;

  const osc = audioCtx.createOscillator();

  const lp  = audioCtx.createBiquadFilter();

  const amp = audioCtx.createGain();

  osc.type = 'sawtooth';

  osc.frequency.setValueAtTime(midiHz(note), when);

  lp.type='lowpass';

  lp.frequency.setValueAtTime(bright? 3900: 2300, when);

  lp.Q.value = 0.75;

  amp.gain.setValueAtTime(0.0001, when);

  amp.gain.linearRampToValueAtTime(gain, when + 0.008);

  amp.gain.exponentialRampToValueAtTime(Math.max(0.0001, gain*0.16), when + Math.max(0.03, dur*0.55));

function playBar(barIndex, when, step, stage, isBoss){

  const tonicChord = 57 + tr;

  const tonicBass  = 33 + tr;

  const tonicLead  = 69 + tr;


  const chord = song.prog[barIndex % song.prog.length];

  const tones = chordTones(tonicChord, chord);


  const hatGain = (song.boss ? 0.036 : 0.028);

  const snGain  = (song.boss ? 0.096 : 0.082);

  const kdGain  = (song.boss ? 0.128 : 0.110);

  const bassGain= (song.boss ? 0.160 : 0.142);


  for(let i=0;i<16;i++){

    const t = when + i*step;


    if(song.kick[i]) kick(t, kdGain, song.boss?0.34:0.28);

      noiseDrum(t, 0.110, snGain, 'snare');

    }


    if(song.hat[i]){

      noiseDrum(t + (i%2?0.004:0), open?0.080:0.042, open?hatGain*1.18:hatGain, 'hat');

    }


    if(i===0 || i===6 || i===8 || i===14){

      const dur = step * (song.boss? 2.8 : 3.1);

      const g = (song.boss?0.015:0.012);

      for(let k=0;k<Math.min(3, tones.length);k++){

        stab(n, t + step*0.02, dur, g, pan, song.boss);

    }


    const b = song.bass[i];

    if(b != null && b !== -1){

      const note = tonicBass + chord.r + b;

      subBass(note, t, step*1.45, bassGain, -0.03);

    }


    const m = song.lead[i];

    if(m != null && m !== -1){

      const g = song.boss ? 0.055 : 0.044;

      const d = step * (song.boss? 1.05 : 0.90);

      if(song.boss && (i%4===0)) fmSparkle(note+12, t + step*0.02, step*0.85, 0.012, 0.08);

function startBGM(stage, isBoss){

  stopBGM();

  }

  if(audioCtx.state !== 'running') return;


  bgmStage = stage || 1;

  bgmBoss  = !!isBoss;


  const LOOP_BARS = 8;

  const st = Math.max(1, Math.min(7, bgmStage));

  const base = (bgmBoss ? 0.30 : 0.19);

  const stBoost = Math.min(0.09, (st-1)*0.013);

  bgmBaseLevel = base + stBoost;

  bgmBus = createBgmBus(bgmBaseLevel);


  const song = songFor(bgmStage, bgmBoss);

  const bpm = song.bpm;


  bgmNextTime = audioCtx.currentTime + 0.07;

  bgmBar = 0;


  bgmTimer = setInterval(() => {

    if(audioCtx.state !== 'running' || !bgmBus) return;

    const step = 60 / bpm / 4;

    while(bgmNextTime < audioCtx.currentTime + 0.42){

      playBar(bgmBar % LOOP_BARS, bgmNextTime, step, bgmStage, bgmBoss);

      bgmNextTime += step * 16;

      bgmBar = (bgmBar + 1) % LOOP_BARS;

    }

  }, 25);

}

function pushEnemyBullets(batch){

 const load = getBulletLoadScale();

 const skipStepBase = load < 0.78 ? 2 : (load < 0.90 ? 1 : 0);

 let skipStep = SE2_MODE ? Math.max(2, skipStepBase+1) : (IS_MOBILE ? Math.max(1, skipStepBase) : skipStepBase);

 let room = Math.max(0, maxEnemyBullets() - enemyBullets.length);

 if(room <= 0) return;


 const hpRatio = bossActive ? Math.max(0, Math.min(1, boss.hp / boss.maxHP)) : 1;

 const phase = bossActive ? (boss.phase || 1) : 1;

 const speedMul = bossActive ? (1 + (1 - hpRatio) * 0.22 + (phase-1) * 0.05) : 1;


 let pushed = 0;

 let mobToggle = 0;

 for(let i=0;i<batch.length && pushed<room;i++){

  if(skipStep && (i % (skipStep+1)) !== 0) continue;

  const b = batch[i];

  if(!b) continue;


  if(!b.boss){ if((mobToggle++ % MOB_BULLET_KEEP_DEN) >= MOB_BULLET_KEEP_NUM) continue; }


  if(b.boss && bossActive){

   b.vx *= speedMul; b.vy *= speedMul;

   if(phase>=4){

    b.curve = (b.curve != null) ? b.curve : ((i%2===0)? 0.0032 : -0.0032);

    b.wave = b.wave || 1;

    b.seed = (b.seed != null) ? b.seed : (boss.t + i*7);

  }


  enemyBullets.push(b);

  pushed++; room--; if(room<=0) break;


  if(b.boss && bossActive && phase>=3 && room>0){

   const ang = Math.atan2(b.vy, b.vx);

   const spd = Math.hypot(b.vx, b.vy) || 1;

   const spread = phase>=4 ? 0.11 : 0.08;

   const copies = phase>=4 ? 2 : 1;

   for(let c=0;c<copies && room>0;c++){

    const dir = (c%2===0) ? 1 : -1;

    const a2 = ang + dir*spread;

    const nb = Object.assign({}, b);

    nb.vx = Math.cos(a2)*spd;

    nb.vy = Math.sin(a2)*spd;

    nb.w = Math.max(6, Math.floor((b.w||10)*0.88));

    nb.h = Math.max(4, Math.floor((b.h||5)*0.88));

     nb.curve = (dir>0)?0.0026:-0.0026;

}

function _distPointSeg(px,py,x1,y1,x2,y2){
 const vx=x2-x1, vy=y2-y1;
 const wx=px-x1, wy=py-y1;
 const c1=vx*wx+vy*wy;
 if(c1<=0) return Math.hypot(px-x1,py-y1);
 const c2=vx*vx+vy*vy;
 if(c2<=c1) return Math.hypot(px-x2,py-y2);
 const t=c1/c2;
 const bx=x1+t*vx, by=y1+t*vy;
 return Math.hypot(px-bx,py-by);
}

function render(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.fillStyle='#020611';
  ctx.fillRect(0,0,VW,VH);

  // WORLD rotated 90° CCW into portrait view
  ctx.save();
  ctx.setTransform(0,-1,1,0,0,W);
  drawBackground(time);
  if(state!=='title' && state!=='ending' && state!=='error') drawTerrains();
  drawParticles();
  drawExplosions();
  if(state==='play'){
    const shipCol=(shotType===2 ? '#89ff9b' : (shotType===0 ? SHOT_COLORS.wide : SHOT_COLORS.normal));
    if(player && (player.inv%6<3)) drawShip(player.x,player.y,player.w,player.h,shipCol);
    if(player && input.focus){
      ctx.save();
      ctx.strokeStyle='rgba(137,255,155,.5)';
      ctx.lineWidth=1.0;
      ctx.beginPath();
      ctx.arc(player.x+13,player.y+9,6,0,Math.PI*2);
      ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,.95)';
      ctx.shadowBlur=(IS_MOBILE?0:14);
      ctx.shadowColor='#ff5db1';
      ctx.fillRect(player.x+11,player.y+7,4,4);
      ctx.restore();
    }
    for(const o of options) drawOption(o);
    for(const b of bullets) drawBullet(b);
    for(const l of lasers) drawLaser(l);
    for(const l of enemyLasers) drawEnemyLaser(l);
    for(const e of enemies) drawEnemy(e);
    drawBoss();
    for(const b of enemyBullets) drawBullet(b);
    for(const p of powerups) drawPower(p);
  }
  ctx.restore();

  // UI upright
  ctx.save();
  ctx.setTransform(1,0,0,1,0,0);
  if(state==='title') drawTitle();
  else if(state==='ending') drawEnding();
  else if(state==='error') drawError();
  else {
    if(bossReady){
      ctx.save();
      ctx.textAlign='center';
      ctx.fillStyle='rgba(255,90,90,.85)';
      ctx.font='900 44px sans-serif';
      ctx.shadowBlur=(IS_MOBILE?0:18);
      ctx.shadowColor='#ff6262';
      ctx.fillText('WARNING',VW/2,160);
      ctx.restore();
    }
    if(clearTimer>0){
      ctx.save();
      ctx.globalAlpha=.72;
      ctx.fillStyle='rgba(3,10,18,.45)';
      ctx.fillRect(0,0,VW,VH);
      glowText(message||'STAGE CLEAR',VW/2,VH/2,44,'center','#89ff9b');
      ctx.restore();
    }
    if(lifeUpTimer>0){
      ctx.save();
      ctx.globalAlpha=Math.min(1,lifeUpTimer/20);
      glowText('1UP',VW/2,210,40,'center','#89ff9b');
      ctx.restore();
    }
    if(bombFlash>0){
      ctx.save();
      ctx.globalAlpha=bombFlash/24*.45;
      ctx.fillStyle='#ff5db1';
      ctx.fillRect(0,0,VW,VH);
      ctx.restore();
      bombFlash--;
    }
    drawHUD();
    if(paused){
      ctx.save();
      ctx.globalAlpha=.72;
      ctx.fillStyle='rgba(0,0,0,.45)';
      ctx.fillRect(0,0,VW,VH);

if(e.code==='Space'){ e.preventDefault(); if(state==='play' && clearTimer<=0){ paused = !paused; } }

});

addEventListener('keyup', e=>{ if(e.key==='ArrowUp') input.up=0; if(e.key==='ArrowDown') input.down=0; if(e.key==='ArrowLeft') input.left=0; if(e.key==='ArrowRight') input.right=0; if(e.key==='Shift') input.focus=0; if(e.key==='z' || e.key==='Z') input.shot=0; if(e.key==='x' || e.key==='X') input.alt=0; if(e.key==='c' || e.key==='C') input.bomb=0; });

syncTypeUI();

loop();

</script><div id="mobileUI" aria-hidden="true"><div id="btnFire" class="btn">FIRE</div><div id="btnFocus" class="btn small">FOCUS+FIRE</div><div id="btnBomb" class="btn small">BOMB</div></div></body></html>
